<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amel Defteri Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #0b3d59; --card: rgba(255, 255, 255, 0.12);
            --light-green: #90ee90; --dark-green: #228b22;
            --red: #e74c3c; --orange: #f39c12; --blue: #3498db;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 500px; margin: auto; padding-bottom: 120px; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px; border-radius: 20px; margin-bottom: 15px; }
        .date-nav { display: flex; align-items: center; gap: 10px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .nav-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .habit-card { background: var(--card); border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .vakit-ad { font-weight: bold; margin-bottom: 8px; display: block; color: #7fbbff; font-size: 0.9rem; }
        .circles-row { display: flex; gap: 12px; justify-content: flex-start; }
        .circle { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s; }
        .s0 { background: rgba(255,255,255,0.05); } 
        .s1 { background: var(--dark-green); box-shadow: 0 0 8px var(--dark-green); } 
        .s2 { background: var(--light-green); box-shadow: 0 0 8px var(--light-green); } 
        .s3 { background: var(--red); } 
        .s4 { background: var(--orange); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-box { aspect-ratio: 1; border-radius: 6px; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: #082d42; padding: 20px; border-radius: 25px; border: 1px solid var(--blue); }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #051a26; padding: 15px; display: flex; gap: 8px; z-index: 1000; }
        input { flex: 1; border-radius: 20px; border: none; padding: 12px; outline: none; background: rgba(255,255,255,0.1); color: white; }
        .add-btn { background: var(--dark-green); color: white; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <div class="date-nav">
            <button class="nav-btn" onclick="degistirTarih(-1)">❮</button>
            <div style="text-align: center; min-width: 80px;">
                <div id="dispDate" style="font-weight: bold;"></div>
                <div id="isToday" style="font-size: 9px; color: var(--light-green);"></div>
            </div>
            <button class="nav-btn" onclick="degistirTarih(1)">❯</button>
        </div>
        <button class="add-btn" style="background:var(--blue)" onclick="showGeneralReport()">📊 GENEL</button>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button class="nav-btn" style="flex:1; background: #2c3e50; font-size: 11px;" onclick="veriyiYedekle()">💾 YEDEKLE</button>
        <button class="nav-btn" style="flex:1; background: #2c3e50; font-size: 11px;" onclick="document.getElementById('importInp').click()">📂 GERİ YÜKLE</button>
        <input type="file" id="importInp" style="display:none" onchange="veriyiYukle(this)">
    </div>

    <div id="vakitList"></div>
    <div id="ozelList"></div>
</div>

<div id="statModal" class="modal">
    <div class="modal-content">
        <h2 id="statTitle" style="color:var(--blue); text-align:center; margin:0;">Takvim</h2>
        <div id="calGrid" class="calendar-grid" style="margin-top:20px;"></div>
        <button class="add-btn" style="width:100%; background:var(--red); margin-top:20px;" onclick="closeModal('statModal')">KAPAT</button>
    </div>
</div>

<div class="footer"><input type="text" id="habInp" placeholder="Ek İbadet..."><button class="add-btn" onclick="yeniEkle()">EKLE</button></div>

<script>
    const vakitler = ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"];
    const basliklar = ["Farz", "Sünnet", "Tesbihat"];
    let seciliTarih = new Date();
    let gunlukVeriler = {};

    function getLocalKey(t) {
        let y = t.getFullYear(), m = String(t.getMonth() + 1).padStart(2, '0'), d = String(t.getDate()).padStart(2, '0');
        return `amel_${y}-${m}-${d}`;
    }

    function getGlobalOzeller() { return JSON.parse(localStorage.getItem('amel_global_ozeller')) || []; }
    function saveGlobalOzeller(liste) { localStorage.setItem('amel_global_ozeller', JSON.stringify(liste)); }

    function veriYukle() {
        const key = getLocalKey(seciliTarih);
        const kaydedilmis = JSON.parse(localStorage.getItem(key));
        const globalListe = getGlobalOzeller();

        if (kaydedilmis) {
            gunlukVeriler = kaydedilmis;
            let guncel = globalListe.map(g => {
                const eski = gunlukVeriler.ozeller.find(o => o.ad === g.ad);
                return { ...g, durum: eski ? eski.durum : 0 };
            });
            gunlukVeriler.ozeller = guncel;
        } else {
            gunlukVeriler = { 
                vakitler: vakitler.map(v => ({ ad: v, durumlar: [0, 0, 0] })), 
                ozeller: globalListe.map(g => ({ ...g, durum: 0 }))
            };
        }
        render();
    }

    function render() {
        const key = getLocalKey(seciliTarih);
        localStorage.setItem(key, JSON.stringify(gunlukVeriler));
        document.getElementById('dispDate').innerText = seciliTarih.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
        document.getElementById('isToday').innerText = (getLocalKey(new Date()) === key) ? "BUGÜN" : "";

        const vDiv = document.getElementById('vakitList');
        vDiv.innerHTML = '<small style="opacity:0.5; margin-left:5px;">BEŞ VAKİT</small>';
        gunlukVeriler.vakitler.forEach((v, vIdx) => {
            vDiv.innerHTML += `<div class="habit-card"><span class="vakit-ad">${v.ad}</span><div class="circles-row">
                ${basliklar.map((b, bIdx) => `<div style="text-align:center"><div class="circle s${v.durumlar[bIdx]}" onclick="degis(${vIdx}, ${bIdx}, '${b.toLowerCase()}')"></div><span style="font-size:9px; opacity:0.7;">${b}</span></div>`).join('')}
            </div></div>`;
        });

        const oDiv = document.getElementById('ozelList');
        oDiv.innerHTML = gunlukVeriler.ozeller.length > 0 ? '<small style="opacity:0.5; margin-left:5px;">ÖZEL TAKİP</small>' : '';
        gunlukVeriler.ozeller.forEach((o, oIdx) => {
            let safeName = o.ad.replace(/'/g, "\\'");
            let ctrl = o.tip === 'sayi' ? `<input type="number" style="width:60px;" value="${o.durum}" onchange="sayiGuncelle(${oIdx}, this.value)">` : `<div class="circle s${o.durum}" onclick="degis(${oIdx}, 0, 'ozel_renk')"></div>`;
            oDiv.innerHTML += `<div class="habit-card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b style="color:var(--blue)">${o.ad}</b><br><small onclick="silSecenekleri('${safeName}')" style="color:var(--red); opacity:0.6; cursor:pointer;">Kaldır</small></div> ${ctrl}</div>`;
        });
    }

window.veriyiYukle = (input) => {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            
            // Basit bir doğrulama: İçinde 'amel_global_ozeller' anahtarı var mı?
            if (!data || typeof data !== 'object') {
                alert("Hata: Geçersiz yedek dosyası!");
                return;
            }

            if(confirm("DİKKAT: Mevcut tüm kayıtlarınız silinecek ve yedekteki veriler yüklenecek. Onaylıyor musunuz?")) {
                
                // 1. Önce LocalStorage'ı tamamen temizleyelim (Amel verileri için)
                const keys = Object.keys(localStorage);
                keys.forEach(k => {
                    if(k.startsWith('amel_')) {
                        localStorage.removeItem(k);
                    }
                });

                // 2. Yeni verileri tek tek yazalım
                Object.keys(data).forEach(k => {
                    localStorage.setItem(k, JSON.stringify(data[k]));
                });

                // 3. Hafızadaki değişkenleri tazeleyelim
                seciliTarih = new Date(); // Bugüne dön
                
                // 4. Uygulamayı görsel ve mantıksal olarak yeniden başlatalım
                alert("Veriler başarıyla yüklendi! Uygulama tazeleniyor...");
                
                // En garanti yöntem: Sayfayı zorlayarak yenile
                window.location.href = window.location.pathname + "?v=" + Date.now();
            }
        } catch (err) {
            alert("Dosya okunurken bir hata oluştu: " + err.message);
        }
    };
    reader.readAsText(input.files[0]);
};

    window.silSecenekleri = (ad) => {
        const cevap = prompt(`'${ad}' işlemi seçin:\n1: Sadece bugünden kaldır\n2: TÜM GÜNLERDEN sil\n(Vazgeçmek için boş bırakın)`);
        if (cevap === "1") { gunlukVeriler.ozeller = gunlukVeriler.ozeller.filter(x => x.ad !== ad); render(); }
        else if (cevap === "2") {
            if(confirm("Kökten silinsin mi?")) {
                let g = getGlobalOzeller().filter(x => x.ad !== ad); saveGlobalOzeller(g);
                Object.keys(localStorage).forEach(k => { if(k.startsWith('amel_') && k !== 'amel_global_ozeller') {
                    let d = JSON.parse(localStorage.getItem(k)); d.ozeller = d.ozeller.filter(o => o.ad !== ad);
                    localStorage.setItem(k, JSON.stringify(d));
                }});
                veriYukle();
            }
        }
    };

    window.degistirTarih = (n) => { seciliTarih.setDate(seciliTarih.getDate() + n); veriYukle(); };
    window.degis = (i, s, tip) => {
        let d = (tip === 'ozel_renk') ? gunlukVeriler.ozeller[i].durum : gunlukVeriler.vakitler[i].durumlar[s];
        if (tip === 'farz') d = (d + 1) % 5; 
        else if (tip === 'sünnet' || tip === 'ozel_renk') d = (d === 1) ? 3 : (d === 3) ? 0 : 1;
        else d = (d + 1) % 5;
        if (tip === 'ozel_renk') gunlukVeriler.ozeller[i].durum = d; else gunlukVeriler.vakitler[i].durumlar[s] = d;
        render();
    };

    window.yeniEkle = () => {
        const ad = document.getElementById('habInp').value; if(!ad) return;
        const g = getGlobalOzeller(); g.push({ ad, tip: confirm("Sayısal mı?") ? 'sayi' : 'renk' });
        saveGlobalOzeller(g); document.getElementById('habInp').value = ""; veriYukle();
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.sayiGuncelle = (i, v) => { gunlukVeriler.ozeller[i].durum = v; render(); };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js', { scope: './' }); });
    }
    veriYukle();
</script>
</body>
</html>
