<style>
    /* Mevcut stillere ek olarak veya değiştirerek: */
    .modal { 
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; 
    }
    .modal-content { 
        background: #082d42; margin: 10% auto; padding: 15px; width: 90%; 
        max-width: 400px; border-radius: 20px; border: 1px solid var(--blue);
        box-sizing: border-box; /* Kaymayı engeller */
    }
    .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    .stats-table td, .stats-table th { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
</style>

<script>
    // ... (vakitler, basliklar, seciliTarih, istatistikAy tanımları aynı kalsın) ...
    const vakitler = ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"];
    const basliklar = ["Farz", "Sünnet", "Tesbihat"];
    let seciliTarih = new Date();
    let istatistikAy = new Date();
    let gunlukVeriler = {};

    // (getLocalKey, getGlobalOzeller, saveGlobalOzeller, veriYukle, render fonksiyonları v15.0 ile aynı)
    // Sadece render içindeki showStats çağrısını parametreye uygun tutun.

    window.showStats = (ad, tip, vIdx, bIdx = 0) => {
        const modal = document.getElementById('statModal');
        const title = document.getElementById('statTitle');
        const grid = document.getElementById('calGrid');
        
        title.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                <button class="nav-btn" onclick="window.ayDegistir(-1, '${ad}','${tip}',${vIdx},${bIdx})">❮</button>
                <div style="font-size:14px; text-align:center;">${ad}<br><small>${istatistikAy.toLocaleDateString('tr',{month:'long', year:'numeric'})}</small></div>
                <button class="nav-btn" onclick="window.ayDegistir(1, '${ad}','${tip}',${vIdx},${bIdx})">❯</button>
            </div>`;

        grid.innerHTML = "";
        let sonGun = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth() + 1, 0).getDate();

        for (let d = 1; d <= sonGun; d++) {
            let t = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth(), d);
            let k = getLocalKey(t);
            let veri = JSON.parse(localStorage.getItem(k));
            let renkSinifi = "s0", icerik = d;

            if (veri) {
                let durum = 0;
                if (tip === 'vakit') {
                    durum = veri.vakitler[vIdx].durumlar[bIdx];
                } else {
                    let ozel = veri.ozeller.find(x => x.ad === ad.replace("\\'", "'"));
                    durum = ozel ? ozel.durum : 0;
                    if (ozel && ozel.tip === 'sayi' && durum > 0) icerik = `${d}<br><b style="font-size:8px; color:yellow">${durum}</b>`;
                }
                renkSinifi = (tip === 'ozel' && icerik != d) ? "s1" : "s" + (durum || 0);
            }
            grid.innerHTML += `<div class="cal-box ${renkSinifi}">${icerik}</div>`;
        }
        modal.style.display = 'block';
    };

    window.showGeneralReport = () => {
        const modal = document.getElementById('statModal');
        const title = document.getElementById('statTitle');
        const grid = document.getElementById('calGrid');
        
        title.innerHTML = `📊 ${istatistikAy.toLocaleDateString('tr',{month:'long'})} Özeti`;
        grid.innerHTML = `<table class="stats-table">
            <thead><tr><th>Amel</th><th>Cem.</th><th>Kaza</th><th>Top.</th></tr></thead>
            <tbody id="reportTableBody"></tbody>
        </table>`;

        let sonGun = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth() + 1, 0).getDate();
        let rapor = { vakitler: vakitler.map(v => ({ad: v, cemaat: 0, kaza: 0})), ozeller: [] };

        // Ay boyunca tüm verileri tara
        for (let d = 1; d <= sonGun; d++) {
            let t = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth(), d);
            let k = getLocalKey(t);
            let veri = JSON.parse(localStorage.getItem(k));
            if(veri) {
                veri.vakitler.forEach((v, idx) => {
                    if(v.durumlar[0] == 1) rapor.vakitler[idx].cemaat++;
                    if(v.durumlar[0] == 3) rapor.vakitler[idx].kaza++;
                });
                veri.ozeller.forEach(o => {
                    let rO = rapor.ozeller.find(x => x.ad === o.ad);
                    if(!rO) { rO = {ad: o.ad, top: 0, tip: o.tip}; rapor.ozeller.push(rO); }
                    if(o.tip === 'sayi') rO.top += Number(o.durum || 0);
                    else if(o.durum == 1) rO.top++;
                });
            }
        }

        const body = document.getElementById('reportTableBody');
        rapor.vakitler.forEach(v => {
            body.innerHTML += `<tr><td>${v.ad}</td><td>${v.cemaat}</td><td>${v.kaza}</td><td>-</td></tr>`;
        });
        rapor.ozeller.forEach(o => {
            body.innerHTML += `<tr style="color:var(--light-green)"><td>${o.ad}</td><td>-</td><td>-</td><td>${o.top}</td></tr>`;
        });

        modal.style.display = 'block';
    };

    // Diğer fonksiyonlar (ayDegistir, closeModal, degistirTarih, degis, yedekleme, yeniEkle, silSecenekleri) v15.0 ile aynıdır.
    // ... 
</script>
