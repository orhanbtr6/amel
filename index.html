<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amel Defteri Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #0b3d59; --card: rgba(255, 255, 255, 0.12); --light-green: #90ee90; --dark-green: #228b22; --red: #e74c3c; --orange: #f39c12; --blue: #3498db; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .main-title { text-align: center; font-size: 20px; font-weight: bold; color: #7fbbff; margin-top: 5px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px rgba(127,187,255,0.7); }
        .container { width: 100%; max-width: 500px; margin: auto; padding-bottom: 110px; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px; border-radius: 20px; margin-bottom: 10px; }
        .date-nav { display: flex; align-items: center; gap: 8px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .habit-card { background: var(--card); border-radius: 15px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .ozel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 5px; }
        .ozel-card { background: var(--card); border-radius: 12px; padding: 10px 5px; border: 1px solid rgba(255,255,255,0.1); text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 100px; }
        .ozel-card b { font-size: 12px; display: block; margin-bottom: 5px; height: 32px; overflow: hidden; }
        .ozel-card small { font-size: 9px; color: var(--orange); opacity: 0.7; cursor: pointer; }
        .vakit-ad { font-weight: bold; margin-bottom: 8px; display: block; color: #7fbbff; font-size: 0.9rem; }
        .circles-row { display: flex; gap: 10px; justify-content: flex-start; }
        .circle { width: 38px; height: 38px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; flex-shrink: 0; }
        .s0 { background: rgba(255,255,255,0.05); } 
        .s1 { background: var(--dark-green); box-shadow: 0 0 8px var(--dark-green); } 
        .s2 { background: var(--light-green); } 
        .s3 { background: var(--red); } 
        .s4 { background: var(--orange); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .cal-box { aspect-ratio: 1; border-radius: 6px; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); text-align: center; cursor: pointer; }
        .day-label { font-size: 9px; opacity: 0.5; font-weight: bold; padding-bottom: 5px; text-align: center; }
        
        .monthly-report-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; color: #fff; }
        .monthly-report-table th { background: rgba(255,255,255,0.1); padding: 4px; position: sticky; top: 0; }
        .monthly-report-table td { border: 1px solid rgba(255,255,255,0.05); text-align: center; padding: 2px 1px; }
        .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #082d42; margin: 15px auto; padding: 15px; width: 95%; max-width: 450px; border-radius: 20px; border: 1px solid var(--blue); box-sizing: border-box; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #051a26; padding: 12px; display: flex; gap: 8px; z-index: 1000; }
        input[type="text"] { flex: 1; border-radius: 20px; border: none; padding: 12px; background: rgba(255,255,255,0.1); color: white; outline: none; }
        input[type="number"] { width: 100%; border-radius: 8px; border: none; padding: 5px; background: rgba(255,255,255,0.1); color: white; text-align: center; }
        .add-btn { background: var(--dark-green); color: white; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">Amel Defterim V.15</div>
    <div class="nav-header">
        <div class="date-nav">
            <button class="nav-btn" onclick="degistirTarih(-1)">❮</button>
            <div style="text-align: center; min-width: 70px;">
                <div id="dispDate" style="font-weight: bold; font-size: 14px;"></div>
                <div id="isToday" style="font-size: 9px; color: var(--light-green);"></div>
            </div>
            <button class="nav-btn" onclick="degistirTarih(1)">❯</button>
        </div>
        <button class="add-btn" style="background:var(--blue); font-size: 11px;" onclick="showGeneralReport()">📊 GENEL</button>
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
        <button class="nav-btn" style="flex:1; background: #1a2a3a; font-size: 10px;" onclick="veriyiYedekle()">💾 YEDEK</button>
        <button class="nav-btn" style="flex:1; background: #1a2a3a; font-size: 10px;" onclick="document.getElementById('importInp').click()">📂 YÜKLE</button>
        <input type="file" id="importInp" style="display:none" onchange="veriyiYukle(this)">
    </div>

    <div id="vakitList"></div>
    <div id="ozelBaslik" style="margin-top: 15px;"></div>
    <div id="ozelList" class="ozel-grid"></div>
</div>

<div id="statModal" class="modal">
    <div class="modal-content">
        <div id="statTitle"></div>
        <div id="calGrid" style="overflow-x: auto;"></div>
        <button class="add-btn" style="width:100%; background:var(--red); margin-top:15px;" onclick="closeModal('statModal')">KAPAT</button>
    </div>
</div>

<div class="footer">
    <input type="text" id="habInp" placeholder="Yeni görev...">
    <button class="add-btn" onclick="yeniEkle()">EKLE</button>
</div>

<script>
    const vakitler = ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"];
    const basliklar = ["Farz", "Sünnet", "Tesbihat"];
    const gunlerShort = ["Pt", "Sa", "Ça", "Pe", "Cu", "Ct", "Pa"];
    let seciliTarih = new Date();
    let istatistikAy = new Date();
    let gunlukVeriler = {};

    function getLocalKey(t) {
        let y = t.getFullYear(), m = String(t.getMonth() + 1).padStart(2, '0'), d = String(t.getDate()).padStart(2, '0');
        return `amel_${y}-${m}-${d}`;
    }

    function getGlobalOzeller() { return JSON.parse(localStorage.getItem('amel_global_ozeller')) || []; }
    function saveGlobalOzeller(liste) { localStorage.setItem('amel_global_ozeller', JSON.stringify(liste)); }

    function veriYukle() {
        const key = getLocalKey(seciliTarih);
        const kaydedilmis = JSON.parse(localStorage.getItem(key));
        const aktifListe = getGlobalOzeller().filter(g => !g.arsiv);
        if (kaydedilmis) {
            gunlukVeriler = kaydedilmis;
            gunlukVeriler.ozeller = aktifListe.map(g => {
                const eski = gunlukVeriler.ozeller.find(o => o.ad === g.ad);
                return { ...g, durum: eski ? (eski.durum || 0) : 0 };
            });
        } else {
            gunlukVeriler = { vakitler: vakitler.map(v => ({ ad: v, durumlar: [0, 0, 0] })), ozeller: aktifListe.map(g => ({ ...g, durum: 0 })) };
        }
        render();
    }

    function render() {
        localStorage.setItem(getLocalKey(seciliTarih), JSON.stringify(gunlukVeriler));
        document.getElementById('dispDate').innerText = seciliTarih.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
        document.getElementById('isToday').innerText = (getLocalKey(new Date()) === getLocalKey(seciliTarih)) ? "BUGÜN" : "";

        const vDiv = document.getElementById('vakitList');
        vDiv.innerHTML = '<small style="opacity:0.5; margin-left:5px;">BEŞ VAKİT</small>';
        gunlukVeriler.vakitler.forEach((v, vIdx) => {
            let row = `<div class="habit-card"><span class="vakit-ad">${v.ad}</span><div class="circles-row">`;
            basliklar.forEach((b, bIdx) => {
                row += `<div style="text-align:center"><div class="circle s${v.durumlar[bIdx]}" onclick="window.degis(${vIdx}, ${bIdx}, '${b.toLowerCase()}')"></div>
                <span style="font-size:9px; opacity:0.7; cursor:pointer;" onclick="window.showStats('${v.ad} ${b}', 'vakit', ${vIdx}, ${bIdx})">${b}</span></div>`;
            });
            vDiv.innerHTML += row + `</div></div>`;
        });

        const oDiv = document.getElementById('ozelList');
        document.getElementById('ozelBaslik').innerHTML = gunlukVeriler.ozeller.length > 0 ? '<small style="opacity:0.5; margin-left:5px;">ÖZEL TAKİP</small>' : '';
        oDiv.innerHTML = "";
        gunlukVeriler.ozeller.forEach((o, oIdx) => {
            let safeName = o.ad.replace(/'/g, "\\'");
            let ctrl = o.tip === 'sayi' ? `<input type="number" value="${o.durum}" onchange="window.sayiGuncelle(${oIdx}, this.value)">` : `<div class="circle s${o.durum}" onclick="window.degis(${oIdx}, 0, 'ozel_renk')"></div>`;
            oDiv.innerHTML += `<div class="ozel-card">
                <div onclick="window.showStats('${safeName}', 'ozel', ${oIdx})" style="cursor:pointer; width:100%"><b>${o.ad}</b></div> 
                ${ctrl}
                <small onclick="window.silSecenekleri('${safeName}')">Arşivle</small>
            </div>`;
        });
    }

    // Takvimden güne gitme fonksiyonu
    window.goToDay = (d) => {
        seciliTarih = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth(), d);
        closeModal('statModal');
        veriYukle();
    };

    window.showStats = (ad, tip, vIdx, bIdx = 0) => {
        const modal = document.getElementById('statModal');
        const grid = document.getElementById('calGrid');
        document.getElementById('statTitle').innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="nav-btn" onclick="window.ayDegistir(-1,'${ad}','${tip}',${vIdx},${bIdx})">❮</button>
            <div style="text-align:center; font-size:13px;">${ad}<br><small>${istatistikAy.toLocaleDateString('tr',{month:'long',year:'numeric'})}</small></div>
            <button class="nav-btn" onclick="window.ayDegistir(1,'${ad}','${tip}',${vIdx},${bIdx})">❯</button></div>`;
        
        let gridHtml = `<div class="calendar-grid">`;
        gunlerShort.forEach(g => gridHtml += `<div class="day-label">${g}</div>`);
        let ilkGun = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth(), 1).getDay();
        let ofset = (ilkGun === 0) ? 6 : ilkGun - 1;
        for (let i = 0; i < ofset; i++) gridHtml += `<div></div>`;
        let son = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth() + 1, 0).getDate();
        for (let d = 1; d <= son; d++) {
            let t = new Date(istatistikAy.getFullYear(), istatistikAy.getMonth(), d);
            let veri = JSON.parse(localStorage.getItem(getLocalKey(t)));
            let rs = "s0", icerik = d;
            if (veri) {
                let d_val = (tip === 'vakit') ? veri.vakitler[vIdx].durumlar[bIdx] : (veri.ozeller.find(x => x.ad === ad.replace("\\'", "'"))?.durum || 0);
                if (tip === 'ozel' && !isNaN(d_val) && d_val > 0) icerik = `${d}<br><b style="color:yellow;font-size:8px">${d_val}</b>`;
                rs = "s" + (d_val || 0);
            }
            gridHtml += `<div class="cal-box ${rs}" onclick="window.goToDay(${d})">${icerik}</div>`;
        }
        grid.innerHTML = gridHtml + `</div>`;
        modal.style.display = 'block';
    };

    // GENEL RAPOR - Ay değiştirme ve dikey daraltılmış görünüm
    window.showGeneralReport = () => {
        const modal = document.getElementById('statModal');
        const grid = document.getElementById('calGrid');
        const yil = istatistikAy.getFullYear();
        const ay = istatistikAy.getMonth();
        
        document.getElementById('statTitle').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                <button class="nav-btn" onclick="window.aylikRaporDegistir(-1)">❮</button>
                <div style="text-align:center;">
                    <div style="font-size:14px; font-weight:bold;">📊 ${istatistikAy.toLocaleDateString('tr',{month:'long', year:'numeric'})}</div>
                </div>
                <button class="nav-btn" onclick="window.aylikRaporDegistir(1)">❯</button>
            </div>`;

        let tableHtml = `<table class="monthly-report-table">
            <thead><tr><th>G</th><th>Sab</th><th>Öğl</th><th>İkin</th><th>Akş</th><th>Yat</th></tr></thead><tbody>`;

        let sonGun = new Date(yil, ay + 1, 0).getDate();
        for (let d = 1; d <= sonGun; d++) {
            let t = new Date(yil, ay, d);
            let veri = JSON.parse(localStorage.getItem(getLocalKey(t)));
            let row = `<tr onclick="window.goToDay(${d})"><td><b>${d}</b></td>`;
            for (let vIdx = 0; vIdx < 5; vIdx++) {
                let sClass = "s0";
                if (veri && veri.vakitler[vIdx]) sClass = "s" + (veri.vakitler[vIdx].durumlar[0] || 0);
                row += `<td><div class="color-dot ${sClass}"></div></td>`;
            }
            tableHtml += row + `</tr>`;
        }
        tableHtml += `</tbody></table>`;
        
        // Alt özetler
        let raporO = [];
        for (let d = 1; d <= sonGun; d++) {
            let t = new Date(yil, ay, d);
            let veri = JSON.parse(localStorage.getItem(getLocalKey(t)));
            if(veri) {
                veri.ozeller.forEach(oz => {
                    let r = raporO.find(x => x.ad === oz.ad);
                    if(!r) { r = {ad: oz.ad, t:0, tip:oz.tip}; raporO.push(r); }
                    if(oz.tip==='sayi') r.t += Number(oz.durum||0); else if(oz.durum == 1 || oz.durum == 2) r.t++;
                });
            }
        }
        if(raporO.length > 0) {
            tableHtml += `<div style="margin-top:10px; font-size:11px; border-top:1px solid #444; padding-top:5px;"><b>Özetler:</b></div>`;
            raporO.filter(o => o.t > 0).forEach(o => {
                tableHtml += `<div style="display:flex; justify-content:space-between; font-size:10px; padding:2px 0;"><span>${o.ad}</span><b style="color:var(--light-green)">${o.t}</b></div>`;
            });
        }

        grid.innerHTML = tableHtml;
        modal.style.display = 'block';
    };

    window.aylikRaporDegistir = (n) => { istatistikAy.setMonth(istatistikAy.getMonth() + n); showGeneralReport(); };
    window.ayDegistir = (n, ad, tip, vIdx, bIdx) => { istatistikAy.setMonth(istatistikAy.getMonth() + n); window.showStats(ad, tip, vIdx, bIdx); };
    window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; istatistikAy = new Date(); };
    window.degistirTarih = (n) => { seciliTarih.setDate(seciliTarih.getDate() + n); veriYukle(); };
    window.degis = (i, s, tip) => {
        if (tip === 'ozel_renk') { let d = gunlukVeriler.ozeller[i].durum; gunlukVeriler.ozeller[i].durum = (d == 1) ? 3 : (d == 3) ? 0 : 1; }
        else { let d = gunlukVeriler.vakitler[i].durumlar[s]; if (tip === 'farz') gunlukVeriler.vakitler[i].durumlar[s] = (d + 1) % 5; else gunlukVeriler.vakitler[i].durumlar[s] = (d == 1) ? 3 : (d == 3) ? 0 : 1; }
        render();
    };
    window.veriyiYedekle = () => {
        let d = {}; Object.keys(localStorage).forEach(k => { if(k.startsWith('amel_')) d[k] = JSON.parse(localStorage.getItem(k)); });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)],{type:"application/json"})); a.download=`amel_yedek.json`; a.click();
    };
    window.veriyiYukle = (input) => {
        const r = new FileReader(); r.onload = (e) => { try { const d = JSON.parse(e.target.result); if(confirm("Yüklensin mi?")) { Object.keys(localStorage).forEach(k => { if(k.startsWith('amel_')) localStorage.removeItem(k); }); Object.keys(d).forEach(k => localStorage.setItem(k, JSON.stringify(d[k]))); window.location.reload(); } } catch(err) { alert("Hata!"); } }; r.readAsText(input.files[0]);
    };
    window.yeniEkle = () => { 
        const ad = document.getElementById('habInp').value; if(!ad) return; 
        let g = getGlobalOzeller(); let eskiIdx = g.findIndex(x => x.ad === ad);
        if(eskiIdx > -1) g[eskiIdx].arsiv = false; else g.push({ ad, tip: confirm("Sayısal mı?") ? 'sayi' : 'renk', arsiv: false });
        saveGlobalOzeller(g); document.getElementById('habInp').value = ""; veriYukle(); 
    };
    window.silSecenekleri = (ad) => { 
        let secim = prompt("'ARŞİV' yazarsanız listeden kalkar ama raporlarda görünür. 'SİL' yazarsanız her yerden tamamen silinir.");
        if(secim && secim.toUpperCase() === 'ARŞİV') {
            let g = getGlobalOzeller(); let idx = g.findIndex(x => x.ad === ad);
            if(idx > -1) g[idx].arsiv = true; saveGlobalOzeller(g); veriYukle();
        } else if(secim && secim.toUpperCase() === 'SİL') {
            saveGlobalOzeller(getGlobalOzeller().filter(x => x.ad !== ad)); veriYukle();
        }
    };
    window.sayiGuncelle = (i, v) => { gunlukVeriler.ozeller[i].durum = v; render(); };
    veriYukle();
</script>
</body>
</html>
