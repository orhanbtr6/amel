<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('PWA Hazır.'))
        .catch(err => console.log('Hata:', err));
    });
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amel Defteri Pro</title>
    <style>
        :root {
            --bg: #0b3d59; --card: rgba(255, 255, 255, 0.12);
            --light-green: #90ee90; --dark-green: #228b22;
            --red: #e74c3c; --orange: #f39c12; --blue: #3498db;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 500px; margin: auto; padding-bottom: 120px; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px; border-radius: 20px; margin-bottom: 15px; }
        .date-nav { display: flex; align-items: center; gap: 10px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        
        .habit-card { background: var(--card); border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .vakit-ad { font-weight: bold; margin-bottom: 8px; display: block; color: #7fbbff; font-size: 0.9rem; }
        .circles-row { display: flex; gap: 12px; justify-content: flex-start; }
        .circle { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; }
        
        .s0 { background: rgba(255,255,255,0.05); } 
        .s1 { background: var(--dark-green); box-shadow: 0 0 8px var(--dark-green); } 
        .s2 { background: var(--light-green); box-shadow: 0 0 8px var(--light-green); } 
        .s3 { background: var(--red); } 
        .s4 { background: var(--orange); }

        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-box { aspect-ratio: 1; border-radius: 6px; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }
        .cal-val { font-size: 8px; font-weight: bold; margin-top: 2px; color: #fff; background: rgba(0,0,0,0.2); padding: 1px 3px; border-radius: 3px; }
        .cal-day-name { font-size: 9px; opacity: 0.5; text-align: center; margin-bottom: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: #082d42; padding: 20px; border-radius: 25px; border: 1px solid var(--blue); }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; text-align: center; margin: 5px 0; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #051a26; padding: 15px; display: flex; gap: 8px; }
        input { flex: 1; border-radius: 20px; border: none; padding: 12px; outline: none; }
        .add-btn { background: var(--dark-green); color: white; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <div class="date-nav">
            <button class="nav-btn" onclick="degistirTarih(-1)">❮</button>
            <div style="text-align: center; min-width: 80px;">
                <div id="dispDate" style="font-weight: bold;"></div>
                <div id="isToday" style="font-size: 9px; color: var(--light-green);"></div>
            </div>
            <button class="nav-btn" onclick="degistirTarih(1)">❯</button>
        </div>
        <button class="add-btn" style="background:var(--blue)" onclick="showGeneralReport()">📊 GENEL</button>
    </div>
    <div id="vakitList"></div>
    <div id="ozelList"></div>
</div>

<div id="statModal" class="modal">
    <div class="modal-content">
        <h2 id="statTitle" style="color:var(--blue); text-align:center; margin:0;">Takvim</h2>
        <div class="calendar-nav">
            <button class="nav-btn" onclick="navCal(-1)">❮</button>
            <b id="calMonthYear"></b>
            <button class="nav-btn" onclick="navCal(1)">❯</button>
        </div>
        <div id="statSummaryArea" style="display:flex; gap:10px;"></div>
        <div class="calendar-grid" id="calGrid"></div>
        <button class="add-btn" style="width:100%; background:var(--red); margin-top:20px;" onclick="closeModal('statModal')">KAPAT</button>
    </div>
</div>

<div class="footer"><input type="text" id="habInp" placeholder="Ek İbadet..."><button class="add-btn" onclick="yeniEkle()">EKLE</button></div>

<script>
    const vakitler = ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"];
    const basliklar = ["Farz", "Sünnet", "Tesbihat"];
    let seciliTarih = new Date();
    let calTarih = new Date();
    let currentCtx = { title: "", mod: "", idx: 0, subIdx: 0 };
    let gunlukVeriler = {};

    function getLocalKey(t) {
        let y = t.getFullYear(), m = String(t.getMonth() + 1).padStart(2, '0'), d = String(t.getDate()).padStart(2, '0');
        return `amel_${y}-${m}-${d}`;
    }

    function getGlobalOzeller() {
        return JSON.parse(localStorage.getItem('amel_global_ozeller')) || [];
    }
    function saveGlobalOzeller(liste) {
        localStorage.setItem('amel_global_ozeller', JSON.stringify(liste));
    }

    function veriYukle() {
        const key = getLocalKey(seciliTarih);
        const kaydedilmis = JSON.parse(localStorage.getItem(key));
        const globalListe = getGlobalOzeller();

        if (kaydedilmis) {
            gunlukVeriler = kaydedilmis;
            let guncelOzeller = globalListe.map(g => {
                const eski = gunlukVeriler.ozeller.find(o => o.ad === g.ad);
                return { ...g, durum: eski ? eski.durum : 0 };
            });
            gunlukVeriler.ozeller = guncelOzeller;
        } else {
            gunlukVeriler = { 
                vakitler: vakitler.map(v => ({ ad: v, durumlar: [0, 0, 0] })), 
                ozeller: globalListe.map(g => ({ ...g, durum: 0 }))
            };
        }
        render();
    }

    function render() {
        const key = getLocalKey(seciliTarih);
        localStorage.setItem(key, JSON.stringify(gunlukVeriler));
        document.getElementById('dispDate').innerText = seciliTarih.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
        document.getElementById('isToday').innerText = (getLocalKey(new Date()) === key) ? "BUGÜN" : "";

        const vDiv = document.getElementById('vakitList');
        vDiv.innerHTML = '<small style="opacity:0.5; margin-left:5px;">BEŞ VAKİT</small>';
        gunlukVeriler.vakitler.forEach((v, vIdx) => {
            vDiv.innerHTML += `<div class="habit-card"><span class="vakit-ad">${v.ad}</span><div class="circles-row">
                ${basliklar.map((b, bIdx) => `
                <div style="text-align:center"><div class="circle s${v.durumlar[bIdx]}" onclick="degis(${vIdx}, ${bIdx}, '${b.toLowerCase()}')"></div>
                <span style="font-size:9px; opacity:0.8; cursor:pointer;" onclick="openCalendar('${v.ad} ${b}', 'vakit', ${vIdx}, ${bIdx})">${b}</span></div>`).join('')}
            </div></div>`;
        });

        const oDiv = document.getElementById('ozelList');
        oDiv.innerHTML = gunlukVeriler.ozeller.length > 0 ? '<small style="opacity:0.5; margin-left:5px;">ÖZEL TAKİP</small>' : '';
        gunlukVeriler.ozeller.forEach((o, oIdx) => {
            let ctrl = o.tip === 'sayi' ? `<input type="number" style="width:60px; padding:8px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:1px solid #7fbbff;" value="${o.durum}" onchange="sayiGuncelle(${oIdx}, this.value)">` : `<div class="circle s${o.durum}" onclick="degis(${oIdx}, 0, 'ozel_renk')"></div>`;
            
            // Onarım: İsimleri tırnaklardan arındırıp güvenli hale getirme
            let safeName = o.ad.replace(/'/g, "\\'");
            oDiv.innerHTML += `<div class="habit-card" style="display:flex; justify-content:space-between; align-items:center;">
                <div style="cursor:pointer;" onclick="openCalendar('${safeName}', 'ozel', ${oIdx})"><b style="color:var(--blue)">${o.ad}</b><br><small onclick="event.stopPropagation(); silSecenekleri('${safeName}')" style="color:var(--red); opacity:0.6;">Kaldır</small></div> ${ctrl}</div>`;
        });
    }

    window.silSecenekleri = (ad) => {
        const secim = confirm(`'${ad}' için silme yöntemi seçin:\n\nTAMAM: Sadece bugünden kaldır\nİPTAL: Tüm günlerden (Kökten) sil`);
        if (secim) {
            gunlukVeriler.ozeller = gunlukVeriler.ozeller.filter(x => x.ad !== ad);
            render();
        } else {
            const eminMisiniz = confirm(`'${ad}' tüm geçmiş ve gelecek günlerden tamamen silinecek. Emin misiniz?`);
            if (eminMisiniz) {
                let globalListe = getGlobalOzeller();
                globalListe = globalListe.filter(x => x.ad !== ad);
                saveGlobalOzeller(globalListe);
                
                Object.keys(localStorage).filter(k => k.startsWith('amel_')).forEach(k => {
                    if(k === 'amel_global_ozeller') return;
                    let d = JSON.parse(localStorage.getItem(k));
                    if(d && d.ozeller) {
                        d.ozeller = d.ozeller.filter(o => o.ad !== ad);
                        localStorage.setItem(k, JSON.stringify(d));
                    }
                });
                veriYukle();
            }
        }
    };

    window.openCalendar = (title, mod, idx, subIdx) => {
        currentCtx = { title, mod, idx, subIdx };
        calTarih = new Date(seciliTarih.getFullYear(), seciliTarih.getMonth(), 1);
        buildCalendar();
        document.getElementById('statModal').style.display = 'block';
    };

    window.navCal = (dir) => { calTarih.setMonth(calTarih.getMonth() + dir); buildCalendar(); };

    function buildCalendar() {
        const grid = document.getElementById('calGrid');
        grid.innerHTML = "";
        document.getElementById('calMonthYear').innerText = calTarih.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' });
        ["Pz", "Pt", "Sa", "Ça", "Pe", "Cu", "Ct"].forEach(g => grid.innerHTML += `<div class="cal-day-name">${g}</div>`);
        const y = calTarih.getFullYear(), m = calTarih.getMonth();
        const ilkGun = new Date(y, m, 1).getDay(), toplamGun = new Date(y, m + 1, 0).getDate();
        let yapildi = 0, kaza = 0, toplamSayi = 0;
        let isSayisal = (currentCtx.mod === 'ozel' && gunlukVeriler.ozeller[currentCtx.idx]?.tip === 'sayi');

        for (let i = 0; i < ilkGun; i++) grid.innerHTML += `<div></div>`;
        for (let d = 1; d <= toplamGun; d++) {
            const dKey = `amel_${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const gData = JSON.parse(localStorage.getItem(dKey));
            let s = 0, vStr = "";
            if (gData) {
                if (currentCtx.mod === 'vakit') s = gData.vakitler[currentCtx.idx].durumlar[currentCtx.subIdx];
                else {
                    const o = gData.ozeller.find(x => x.ad === currentCtx.title);
                    if(o) {
                        if(o.tip === 'sayi') { s = o.durum > 0 ? 1 : 0; vStr = o.durum || ""; toplamSayi += Number(o.durum || 0); }
                        else s = o.durum;
                    }
                }
            }
            if (s === 1 || s === 2) yapildi++; if (s === 3) kaza++;
            grid.innerHTML += `<div class="cal-box s${s}">${d}${vStr ? `<div class="cal-val">${vStr}</div>` : ""}</div>`;
        }
        document.getElementById('statSummaryArea').innerHTML = `<div class="stat-box" style="flex:1">${isSayisal ? 'Toplam Skor' : 'Yapıldı'}: ${isSayisal ? toplamSayi : yapildi}</div><div class="stat-box" style="flex:1; color:var(--red)">Kaza/Yok: ${kaza}</div>`;
    }

    window.degistirTarih = (n) => { seciliTarih.setDate(seciliTarih.getDate() + n); veriYukle(); };
    window.degis = (i, s, tip) => {
        let d = (tip === 'ozel_renk') ? gunlukVeriler.ozeller[i].durum : gunlukVeriler.vakitler[i].durumlar[s];
        if (tip === 'farz') d = (d + 1) % 5; 
        else if (tip === 'sünnet' || tip === 'ozel_renk') { if (d === 0) d = 1; else if (d === 1) d = 3; else d = 0; }
        else if (tip === 'tesbihat') { if (d === 0) d = 1; else if (d === 1) d = 3; else if (d === 3) d = 4; else d = 0; }
        if (tip === 'ozel_renk') gunlukVeriler.ozeller[i].durum = d; else gunlukVeriler.vakitler[i].durumlar[s] = d;
        render();
    };

    window.showGeneralReport = () => {
        let cem = 0, tek = 0, kaza = 0;
        Object.keys(localStorage).filter(k => k.startsWith('amel_')).forEach(k => {
            if(k === 'amel_global_ozeller') return;
            const d = JSON.parse(localStorage.getItem(k));
            d.vakitler.forEach(v => v.durumlar.forEach(s => { if(s===2) cem++; if(s===1) tek++; if(s===3) kaza++; }));
        });
        document.getElementById('statTitle').innerText = "Genel Rapor";
        document.getElementById('calMonthYear').innerText = "Tüm Zamanlar";
        document.getElementById('statSummaryArea').innerHTML = `<div class="stat-box" style="flex:1">Münferit: ${tek}</div><div class="stat-box" style="flex:1">Cemaat: ${cem}</div><div class="stat-box" style="flex:1; color:var(--red)">Kaza: ${kaza}</div>`;
        document.getElementById('calGrid').innerHTML = "";
        document.getElementById('statModal').style.display = 'block';
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.sayiGuncelle = (i, v) => { gunlukVeriler.ozeller[i].durum = v; render(); };
    
    window.yeniEkle = () => {
        const ad = document.getElementById('habInp').value; if(!ad) return;
        const globalListe = getGlobalOzeller();
        if(globalListe.find(x => x.ad === ad)) { alert("Bu zaten genel listede var."); return; }
        const yeniObj = { ad, tip: confirm(`'${ad}' sayısal mı?`) ? 'sayi' : 'renk' };
        globalListe.push(yeniObj);
        saveGlobalOzeller(globalListe);
        document.getElementById('habInp').value = "";
        veriYukle();
    };

    veriYukle();
</script>
<script>
// PWA Desteği için Service Worker kaydı
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

        const cevap = prompt(mesaj);

        if (cevap === "1") {
            // Sadece bugünden kaldır
            gunlukVeriler.ozeller = gunlukVeriler.ozeller.filter(x => x.ad !== ad);
            render();
        } 
        else if (cevap === "2") {
            // Tüm günlerden sil
            const eminMisiniz = confirm(`'${ad}' tüm geçmiş ve gelecek kayıtlarıyla tamamen silinecek. Emin misiniz?`);

                let globalListe = getGlobalOzeller();
                globalListe = globalListe.filter(x => x.ad !== ad);
                saveGlobalOzeller(globalListe);
                
                Object.keys(localStorage).filter(k => k.startsWith('amel_')).forEach(k => {
                    if(k === 'amel_global_ozeller') return;
                    let d = JSON.parse(localStorage.getItem(k));
                    if(d && d.ozeller) {
                        d.ozeller = d.ozeller.filter(o => o.ad !== ad);
                        localStorage.setItem(k, JSON.stringify(d));
                    }
                });
                veriYukle();
            }
        }
        // Boş bırakılırsa veya İptal'e basılırsa hiçbir şey yapmaz, menü kapanır.
    };

    // ... (Geri kalan render ve veriYukle fonksiyonları v14.5 ile aynı kalacak)
</script>
