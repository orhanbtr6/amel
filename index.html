<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b3d59">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Amel Defteri V.18.5</title>
    
    <link rel="manifest" href="manifest.json">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <style>
        :root { --bg: #0b3d59; --card: rgba(255, 255, 255, 0.12); --light-green: #90ee90; --dark-green: #228b22; --red: #e74c3c; --orange: #f39c12; --blue: #3498db; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .main-title { text-align: center; font-size: 18px; font-weight: bold; color: #7fbbff; margin-bottom: 10px; text-transform: uppercase; }
        .container { width: 100%; max-width: 500px; margin: auto; padding-bottom: 150px; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px; border-radius: 20px; margin-bottom: 10px; }
        .date-nav { display: flex; align-items: center; gap: 8px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .habit-card { background: var(--card); border-radius: 15px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .vakit-ad { font-weight: bold; margin-bottom: 8px; display: block; color: #7fbbff; font-size: 0.9rem; }
        .circles-row { display: flex; gap: 10px; justify-content: flex-start; }
        .circle { width: 38px; height: 38px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; flex-shrink: 0; }
        
        .s0 { background: rgba(255,255,255,0.05); } 
        .s1 { background: var(--dark-green); } 
        .s2 { background: var(--light-green); } 
        .s3 { background: var(--red); } 
        .s4 { background: var(--orange); }

        .monthly-report-table { margin: 0 auto; border-collapse: separate; border-spacing: 2px; font-size: 9px; color: #fff; width: 100% !important; max-width: 400px; table-layout: fixed; }
        .monthly-report-table td { border: none; text-align: center; padding: 0; margin: 0; cursor: pointer;}
        .col-gun { width: 35px; text-align: right !important; padding-right: 5px !important; opacity: 0.5; font-size: 9px; } 
        .col-vakit { height: 16px; border-radius: 3px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding-top: 20px; }
        .modal-content { background: #082d42; margin: 0 auto; padding: 15px; width: 95%; max-width: 380px; border-radius: 15px; border: 1px solid var(--blue); box-sizing: border-box; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .cal-box { aspect-ratio: 1; border-radius: 6px; font-size: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .cal-box b { font-size: 11px; color: #000; }
        .cal-box small { font-size: 7px; opacity: 0.5; position: absolute; top: 2px; left: 2px; color: #fff; }

        .yearly-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #051a26; padding: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer-row { display: flex; gap: 8px; width: 100%; }
        input[type="text"] { flex: 1; border-radius: 20px; border: none; padding: 12px; background: rgba(255,255,255,0.1); color: white; outline: none; }
        .add-btn { background: var(--dark-green); color: white; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .backup-btn { background: rgba(255,255,255,0.1); color: #ccc; border: none; padding: 6px 12px; border-radius: 10px; font-size: 11px; cursor: pointer; flex: 1; }
        
        .ozel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 5px; }
        .ozel-card { background: var(--card); border-radius: 12px; padding: 10px 5px; border: 1px solid rgba(255,255,255,0.1); text-align: center; min-height: 100px; display: flex; flex-direction: column; justify-content: space-between;}
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">Amel Defteri V.18.5</div>
    <div class="nav-header">
        <div class="date-nav">
            <button class="nav-btn" onclick="degistirTarih(-1)">❮</button>
            <div style="text-align:center;">
                <div id="dispDate" style="font-weight: bold; font-size: 14px;"></div>
                <div id="isToday" style="font-size: 9px; color: var(--light-green); font-weight:bold;"></div>
            </div>
            <button class="nav-btn" onclick="degistirTarih(1)">❯</button>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="nav-btn" style="background:var(--blue); font-size: 10px;" onclick="showGeneralReport()">📊 GENEL</button>
            <button class="nav-btn" style="background:var(--orange); font-size: 10px;" onclick="showYearlyReport()">📅 YILLIK</button>
        </div>
    </div>

    <div id="vakitList"></div>
    <div id="ozelList" class="ozel-grid"></div>
</div>

<div id="statModal" class="modal">
    <div class="modal-content">
        <div id="statTitle"></div>
        <div id="calGrid"></div>
        <button class="add-btn" style="width:100%; background:var(--red); margin-top:15px;" onclick="closeModal()">KAPAT</button>
    </div>
</div>

<div class="footer">
    <div class="footer-row">
        <input type="text" id="habInp" placeholder="Yeni amel...">
        <button class="add-btn" onclick="yeniEkle()">EKLE</button>
    </div>
    <div class="footer-row">
        <button class="backup-btn" onclick="exportData()">💾 YEDEKLE</button>
        <button class="backup-btn" onclick="importData()">📂 GERİ YÜKLE</button>
        <input type="file" id="fileInp" style="display:none" onchange="processFile(this)">
    </div>
</div>

<script>
    const vakitler = ["Sabah", "Öğle", "İkindi", "Akşam", "Yatsı"];
    const basliklar = ["Farz", "Sünnet", "Tesbihat"];
    let seciliTarih = new Date();
    let raporTarih = new Date();
    let gunlukVeriler = {};

    function getLocalKey(t) { return `amel_${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
    function getGlobalOzeller() { return JSON.parse(localStorage.getItem('amel_global_ozeller')) || []; }
    function saveGlobalOzeller(l) { localStorage.setItem('amel_global_ozeller', JSON.stringify(l)); }

    function veriYukle() {
        const key = getLocalKey(seciliTarih);
        const kaydedilmis = JSON.parse(localStorage.getItem(key));
        const aktifListe = getGlobalOzeller().filter(g => !g.arsiv);
        if (kaydedilmis) {
            gunlukVeriler = kaydedilmis;
            gunlukVeriler.ozeller = aktifListe.map(g => {
                const eski = (gunlukVeriler.ozeller || []).find(o => o.id === g.id);
                return { ...g, durum: eski ? (eski.durum || 0) : 0 };
            });
        } else {
            gunlukVeriler = { vakitler: vakitler.map(v => ({ ad: v, durumlar: [0,0,0] })), ozeller: aktifListe.map(g => ({ ...g, durum: 0 })) };
        }
        render();
    }

    function render() {
        localStorage.setItem(getLocalKey(seciliTarih), JSON.stringify(gunlukVeriler));
        document.getElementById('dispDate').innerText = seciliTarih.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
        document.getElementById('isToday').innerText = (getLocalKey(new Date()) === getLocalKey(seciliTarih)) ? "BUGÜN" : "";
        const vDiv = document.getElementById('vakitList');
        vDiv.innerHTML = '';
        gunlukVeriler.vakitler.forEach((v, vIdx) => {
            let row = `<div class="habit-card"><span class="vakit-ad">${v.ad}</span><div class="circles-row">`;
            basliklar.forEach((b, bIdx) => {
                row += `<div style="text-align:center"><div class="circle s${v.durumlar[bIdx]}" onclick="window.degis(${vIdx}, ${bIdx}, 'vakit')"></div>
                <span style="font-size:9px; opacity:0.7; cursor:pointer;" onclick="window.showStats('${v.ad} ${b}', 'vakit', ${vIdx}, ${bIdx})">${b}</span></div>`;
            });
            vDiv.innerHTML += row + `</div></div>`;
        });
        const oDiv = document.getElementById('ozelList');
        oDiv.innerHTML = "";
        gunlukVeriler.ozeller.forEach((o, oIdx) => {
            let ctrl = o.tip === 'sayi' ? `<input type="number" value="${o.durum}" style="width:100%; background:rgba(255,255,255,0.1); color:white; border:none; text-align:center; padding:5px; border-radius:5px;" onchange="window.sayiGuncelle(${oIdx}, this.value)">` : `<div class="circle s${o.durum}" onclick="window.degis(${oIdx}, 0, 'ozel_renk')"></div>`;
            oDiv.innerHTML += `<div class="ozel-card"><b style="cursor:pointer; font-size:11px;" onclick="window.showStats('${o.ad.replace(/'/g,"\\'")}', 'ozel', ${oIdx}, 0, '${o.id}')">${o.ad}</b>${ctrl}<small onclick="window.silSecenekleri('${o.id}')" style="opacity:0.3; font-size:9px; cursor:pointer;">Arşiv</small></div>`;
        });
    }

    // İstatistik Fonksiyonları
    window.showStats = (ad, tip, vIdx, bIdx = 0, id = '') => {
        const modal = document.getElementById('statModal');
        const grid = document.getElementById('calGrid');
        document.getElementById('statTitle').innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><button class="nav-btn" onclick="window.ayDegis(-1,'${ad.replace(/'/g,"\\'")}','${tip}',${vIdx},${bIdx},'${id}')">❮</button><span>${ad}</span><button class="nav-btn" onclick="window.ayDegis(1,'${ad.replace(/'/g,"\\'")}','${tip}',${vIdx},${bIdx},'${id}')">❯</button></div><div style="text-align:center; font-size:11px; margin-bottom:5px;">${raporTarih.toLocaleDateString('tr',{month:'long',year:'numeric'})}</div>`;
        let gridHtml = `<div class="calendar-grid">`;
        let son = new Date(raporTarih.getFullYear(), raporTarih.getMonth() + 1, 0).getDate();
        for (let d = 1; d <= son; d++) {
            let t = new Date(raporTarih.getFullYear(), raporTarih.getMonth(), d);
            let v = JSON.parse(localStorage.getItem(getLocalKey(t)));
            let val = "", cls = "s0", lab = `<small>${d}</small>`;
            if (v) {
                if (tip === 'vakit') cls = "s" + (v.vakitler[vIdx].durumlar[bIdx] || 0);
                else {
                    let o = (v.ozeller || []).find(x => x.ad === ad);
                    if (o && o.durum > 0) { cls = o.tip === 'sayi' ? 's2' : 's' + o.durum; if(o.tip === 'sayi') val = `<b>${o.durum}</b>`; }
                }
            }
            gridHtml += `<div class="cal-box ${cls}" onclick="window.gitTarih(${d})">${lab}${val}</div>`;
        }
        grid.innerHTML = gridHtml + `</div>`;
        modal.style.display = 'block';
    };

    window.showYearlyReport = () => {
        const modal = document.getElementById('statModal');
        const grid = document.getElementById('calGrid');
        const yil = raporTarih.getFullYear();
        document.getElementById('statTitle').innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><button class="nav-btn" onclick="window.yilDegis(-1)">❮</button><b>${yil} YILI ÖZETİ</b><button class="nav-btn" onclick="window.yilDegis(1)">❯</button></div>`;
        let s = {};
        for (let m = 0; m < 12; m++) {
            let son = new Date(yil, m + 1, 0).getDate();
            for (let d = 1; d <= son; d++) {
                let v = JSON.parse(localStorage.getItem(getLocalKey(new Date(yil, m, d))));
                if (!v) continue;
                v.vakitler.forEach((vk, vi) => { vk.durumlar.forEach((dr, bi) => { let k = vk.ad + " " + basliklar[bi]; if(!s[k]) s[k] = { t:0, tip:'v' }; if(dr > 0 && dr != 3) s[k].t += 1; else if(dr == 3) { if(!s[k+" (Kaza)"]) s[k+" (Kaza)"] = { t:0, tip:'v' }; s[k+" (Kaza)"].t += 1; } }); });
                if (v.ozeller) { v.ozeller.forEach(vo => { if(!s[vo.ad]) s[vo.ad] = { t:0, tip:vo.tip }; s[vo.ad].t += (vo.tip === 'sayi' ? parseFloat(vo.durum) : (vo.durum > 0 ? 1 : 0)); }); }
            }
        }
        let h = `<div style="max-height:65vh; overflow-y:auto;">`;
        Object.keys(s).sort().forEach(k => { if(s[k].t > 0) h += `<div class="yearly-row"><span>${k}</span><b>${s[k].t}${s[k].tip==='sayi'?'':' G'}</b></div>`; });
        grid.innerHTML = h + `</div>`;
        modal.style.display = 'block';
    };

    window.showGeneralReport = () => {
        const modal = document.getElementById('statModal');
        const grid = document.getElementById('calGrid');
        document.getElementById('statTitle').innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><button class="nav-btn" onclick="window.ayRaporuDegis(-1)">❮</button><span>${raporTarih.toLocaleDateString('tr',{month:'long'})}</span><button class="nav-btn" onclick="window.ayRaporuDegis(1)">❯</button></div>`;
        let th = `<table class="monthly-report-table"><tbody>`;
        let son = new Date(raporTarih.getFullYear(), raporTarih.getMonth() + 1, 0).getDate();
        for (let d = 1; d <= son; d++) {
            let t = new Date(raporTarih.getFullYear(), raporTarih.getMonth(), d);
            let v = JSON.parse(localStorage.getItem(getLocalKey(t)));
            th += `<tr><td class="col-gun">${d}</td>`;
            for (let i = 0; i < 5; i++) th += `<td class="col-vakit s${(v && v.vakitler[i]) ? (v.vakitler[i].durumlar[0] || 0) : 0}" onclick="window.gitTarih(${d})"></td>`;
            th += `</tr>`;
        }
        grid.innerHTML = th + `</tbody></table>`;
        modal.style.display = 'block';
    };

    // Navigasyon ve İşlem Fonksiyonları
    window.ayDegis = (n, ad, t, vi, bi, id) => { raporTarih.setMonth(raporTarih.getMonth()+n); window.showStats(ad, t, vi, bi, id); };
    window.yilDegis = (n) => { raporTarih.setFullYear(raporTarih.getFullYear()+n); window.showYearlyReport(); };
    window.ayRaporuDegis = (n) => { raporTarih.setMonth(raporTarih.getMonth()+n); window.showGeneralReport(); };
    window.gitTarih = (d) => { seciliTarih = new Date(raporTarih.getFullYear(), raporTarih.getMonth(), d); closeModal(); veriYukle(); };
    window.closeModal = () => { document.getElementById('statModal').style.display = 'none'; raporTarih = new Date(); };
    window.degistirTarih = (n) => { seciliTarih.setDate(seciliTarih.getDate() + n); veriYukle(); };
    
    window.degis = (i, s, t) => {
        if (t === 'ozel_renk') { let d = gunlukVeriler.ozeller[i].durum; gunlukVeriler.ozeller[i].durum = (d == 1) ? 3 : (d == 3) ? 0 : 1; }
        else { let d = gunlukVeriler.vakitler[i].durumlar[s]; if (s === 0) gunlukVeriler.vakitler[i].durumlar[s] = (d + 1) % 5; else gunlukVeriler.vakitler[i].durumlar[s] = (d == 1) ? 3 : (d == 3) ? 0 : 1; }
        render();
    };

    window.yeniEkle = () => { 
        const ad = document.getElementById('habInp').value; if(!ad) return; 
        let g = getGlobalOzeller(); g.push({ id: 'id' + Date.now(), ad, tip: confirm("Sayısal veri mi?") ? 'sayi' : 'renk', arsiv: false });
        saveGlobalOzeller(g); document.getElementById('habInp').value = ""; veriYukle(); 
    };

    window.silSecenekleri = (id) => { if(confirm("Arşivlensin mi?")) { let g = getGlobalOzeller(); let idx = g.findIndex(x => x.id === id); if(idx > -1) g[idx].arsiv = true; saveGlobalOzeller(g); veriYukle(); } };
    window.sayiGuncelle = (i, v) => { gunlukVeriler.ozeller[i].durum = v; render(); };

    // Yedekleme İşlemleri
    window.exportData = () => {
        let all = {};
        for(let i=0; i<localStorage.length; i++){
            let key = localStorage.key(i);
            if(key.startsWith('amel_')) all[key] = localStorage.getItem(key);
        }
        let blob = new Blob([JSON.stringify(all)], {type: "application/json"});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `amel_yedek_${new Date().toLocaleDateString()}.json`;
        a.click();
    };

    window.importData = () => { document.getElementById('fileInp').click(); };
    window.processFile = (inp) => {
        let fr = new FileReader();
        fr.onload = () => {
            let data = JSON.parse(fr.result);
            if(confirm("Tüm veriler üzerine yazılsın mı?")) {
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                location.reload();
            }
        };
        fr.readAsText(inp.files[0]);
    };

    veriYukle();
</script>
</body>
</html>
